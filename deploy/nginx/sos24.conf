# Внешний nginx (ВМ с белым IP) — TLS-терминация + reverse proxy в K8s по NodePort.
# Кластер: 3 control-plane ноды в HA (10.10.38.11/12/13). NodePort открыт на всех трёх,
# поэтому перечисляем все три как upstream — proxy переживёт падение любой ноды.
# Домены api.sos24.uz / admin.sos24.uz уже настроены в этом nginx (SSL получен) — сейчас заглушка.

upstream sos24_api {
    server 10.10.38.11:30030 max_fails=2 fail_timeout=10s;
    server 10.10.38.12:30030 max_fails=2 fail_timeout=10s;
    server 10.10.38.13:30030 max_fails=2 fail_timeout=10s;
}
upstream sos24_admin {
    server 10.10.38.11:30035 max_fails=2 fail_timeout=10s;
    server 10.10.38.12:30035 max_fails=2 fail_timeout=10s;
    server 10.10.38.13:30035 max_fails=2 fail_timeout=10s;
}

# ── API ──
server {
    listen 443 ssl http2;
    server_name api.sos24.uz;

    ssl_certificate     /etc/letsencrypt/live/api.sos24.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sos24.uz/privkey.pem;

    client_max_body_size 25m;   # запас под фото/документы

    location / {
        proxy_pass http://sos24_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── Admin ──
server {
    listen 443 ssl http2;
    server_name admin.sos24.uz;

    ssl_certificate     /etc/letsencrypt/live/admin.sos24.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.sos24.uz/privkey.pem;

    location / {
        proxy_pass http://sos24_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;       # на будущее (WS)
        proxy_set_header Connection "upgrade";
    }
}

# ── HTTP → HTTPS ──
server {
    listen 80;
    server_name api.sos24.uz admin.sos24.uz;
    location / { return 301 https://$host$request_uri; }
}
