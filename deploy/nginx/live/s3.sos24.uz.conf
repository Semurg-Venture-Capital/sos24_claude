# s3.sos24.uz → MinIO S3-API (NodePort 30900 на 3 нодах кластера).
# Наружу ТОЛЬКО S3-API; консоль MinIO (9001) не проксируется.
# Безопасность: приватный бакет + presigned-URL (выдаёт sos24-api после JWT).
server {
    listen 80;
    listen [::]:80;
    server_name s3.sos24.uz;
    location /.well-known/acme-challenge/ { root /var/www/_acme-challenge; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;
    http2 on;
    server_name s3.sos24.uz;

    ssl_certificate     /etc/nginx/ssl/s3.sos24.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/s3.sos24.uz/key.pem;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    more_set_headers "X-Content-Type-Options: nosniff";
    more_clear_headers "X-Powered-By";
    more_clear_headers "Server";

    # Крупные медиа (видео ДТП ≤80 МБ) + запас. Стримим, не буферизуя на диск.
    client_max_body_size 200m;
    proxy_request_buffering off;
    proxy_buffering off;

    # ВАЖНО: presigned-URL подписан под Host s3.sos24.uz (SigV4 включает host) —
    # передаём Host как есть, иначе подпись не сойдётся.
    location / {
        proxy_pass http://sos24_s3;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
