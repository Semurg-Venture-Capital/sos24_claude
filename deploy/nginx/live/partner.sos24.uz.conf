server {
    listen 80;
    listen [::]:80;
    server_name partner.sos24.uz;
    location /.well-known/acme-challenge/ { root /var/www/_acme-challenge; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    http2 on;
    server_name partner.sos24.uz;

    ssl_certificate     /etc/nginx/ssl/partner.sos24.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/partner.sos24.uz/key.pem;

    # HTTP/3 анонс
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-XSS-Protection: 0";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";

    more_clear_headers "X-Powered-By";
    more_clear_headers "Server";

    # Приоритет zstd: переписываем Accept-Encoding до модулей сжатия
    more_set_input_headers "Accept-Encoding: $enc_prefer";

    client_max_body_size 25m;

    # → SOS24 Partner (Next.js) в K8s
    location / {
        proxy_pass http://sos24_partner;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
