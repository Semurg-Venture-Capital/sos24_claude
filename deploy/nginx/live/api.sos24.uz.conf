server {
    listen 80;
    listen [::]:80;
    server_name api.sos24.uz;
    location /.well-known/acme-challenge/ { root /var/www/_acme-challenge; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;
    http2 on;
    server_name api.sos24.uz;

    ssl_certificate     /etc/nginx/ssl/api.sos24.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.sos24.uz/key.pem;

    # HTTP/3 анонс
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-XSS-Protection: 0";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";

    # Убираем лишние заголовки
    more_clear_headers "X-Powered-By";
    more_clear_headers "Server";

    # Приоритет zstd: переписываем Accept-Encoding до модулей сжатия
    more_set_input_headers "Accept-Encoding: $enc_prefer";

    # Запас под фото ДТП/документы
    client_max_body_size 25m;

    location /geo {
        add_header Access-Control-Allow-Origin * always;
        default_type application/json;
        return 200 '{"ip":"$remote_addr","country":"$geoip2_country_code","country_name":"$geoip2_country_name","city":"$geoip2_city","lat":"$geoip2_lat","lon":"$geoip2_lon"}';
    }

    # → SOS24 API (NestJS) в K8s
    location / {
        proxy_pass http://sos24_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (Socket.IO чата поддержки, namespace /support, путь /socket.io/)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
