# SOS24 — SIP WebSocket (софтфон колл-центра).
# wss://sip.sos24.uz/ws  →  nginx (TLS 443)  →  plain ws  http://10.10.10.30:8088/ws (Asterisk chan_pjsip).
# ARI/AMI (8088/ari, 5038) наружу НЕ проксируем — только /ws. Медиа (RTP) идёт через coturn, не через nginx.
# HTTP/2/QUIC на этом vhost НЕ включаем: браузерный WebSocket-handshake должен идти по HTTP/1.1 Upgrade.
server {
    listen 80;
    listen [::]:80;
    server_name sip.sos24.uz;
    location /.well-known/acme-challenge/ { root /var/www/_acme-challenge; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sip.sos24.uz;

    ssl_certificate     /etc/nginx/ssl/sip.sos24.uz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/sip.sos24.uz/key.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    more_clear_headers "X-Powered-By";
    more_clear_headers "Server";

    # WebSocket-сигнализация Asterisk (res_http_websocket на http-порту 8088, endpoint /ws)
    location /ws {
        proxy_pass http://10.10.10.30:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / { return 404; }
}
