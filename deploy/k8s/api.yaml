# SOS24 API — миграции (Job) + Deployment + NodePort.
# Образ: заменить __REGISTRY__ на реальный (ghcr.io/<org> / Harbor / Docker Hub).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sos24-api-migrate
  namespace: sos24-dev
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: __REGISTRY__/sos24-api:latest
          command: ["node_modules/.bin/prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: sos24-api-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sos24-api
  namespace: sos24-dev
spec:
  replicas: 2
  selector:
    matchLabels: { app: sos24-api }
  template:
    metadata:
      labels: { app: sos24-api }
    spec:
      containers:
        - name: api
          image: __REGISTRY__/sos24-api:latest
          ports:
            - containerPort: 3030
          envFrom:
            - secretRef:
                name: sos24-api-secret
          readinessProbe:
            httpGet: { path: /api-docs, port: 3030 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api-docs, port: 3030 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            # Chromium (PDF европротокола) прожорлив: Node + headless Chrome
            # в 768Mi не влезали → браузер убивался («Code: null»).
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1536Mi" }
          volumeMounts:
            # Дефолтный /dev/shm в контейнере — 64 МБ, Chromium этого мало.
            # Даём 256 МБ (в паре с флагом --disable-dev-shm-usage).
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sos24-api
  namespace: sos24-dev
spec:
  type: NodePort
  selector: { app: sos24-api }
  ports:
    - port: 3030
      targetPort: 3030
      nodePort: 30030
