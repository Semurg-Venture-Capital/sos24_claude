# ПРИМЕР. Скопировать в secret.yaml, заполнить РЕАЛЬНЫЕ значения и применить.
# secret.yaml в git НЕ коммитим (см. .gitignore). Позже мигрируем в Vault (DEVOPS.md).
#   kubectl apply -f deploy/k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: sos24-api-secret
  namespace: sos24-dev
type: Opaque
stringData:
  # БД (Postgres в кластере, namespace sos24-dev) — внутренний адрес.
  # ВНИМАНИЕ: пароль Sos24DB@2026 содержит '@' → его ОБЯЗАТЕЛЬНО URL-кодировать (@ → %40),
  # иначе Prisma разберёт строку неверно. Готовое значение:
  DATABASE_URL: "postgresql://sos24:Sos24DB%402026@postgresql.sos24-dev.svc.cluster.local:5432/sos24?schema=public"
  # Redis API пока не использует — переменная не нужна.

  # JWT — сгенерировать: openssl rand -hex 32
  JWT_ACCESS_SECRET: "CHANGE_ME"
  JWT_REFRESH_SECRET: "CHANGE_ME"
  JWT_ACCESS_TTL: "15m"
  JWT_REFRESH_TTL: "30d"

  PORT: "3030"

  # MinIO (self-hosted S3). В кластере — сервис minio.<ns>.svc, порт 9000.
  # Хранит подписи/схемы/фото Европротокола, документы, PDF.
  # ВАЖНО: MINIO_ACCESS_KEY/SECRET_KEY ДОЛЖНЫ совпадать с root-кредами MinIO
  # (sos24-minio-secret ниже): ACCESS_KEY = MINIO_ROOT_USER, SECRET_KEY = MINIO_ROOT_PASSWORD.
  MINIO_ENDPOINT: "minio.sos24-dev.svc.cluster.local"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"
  MINIO_BUCKET: "sos24"
  # Публичный S3-endpoint для presigned-URL (хост должен совпадать с тем, куда ходит клиент).
  # Пока без TLS — http://s3.sos24.uz; после сертификата → https://s3.sos24.uz
  MINIO_PUBLIC_ENDPOINT: "https://s3.sos24.uz"

  # MyID (prod или dev-ключи). dev: api.devmyid.uz / prod: api.myid.uz
  MYID_MOCK: "false"
  MYID_BASE_URL: "https://api.devmyid.uz"
  MYID_CLIENT_ID: "CHANGE_ME"
  MYID_CLIENT_SECRET: "CHANGE_ME"
  MYID_CLIENT_HASH_ID: "CHANGE_ME"
  MYID_CLIENT_HASH: "CHANGE_ME"        # RSA public key, без переносов строк
  MYID_ENVIRONMENT: "debug"            # debug | production

  # НАПП (e-osgo.uz). sandbox / prod: erspapiv2.e-osgo.uz (нужен whitelist IP сервера)
  NAPP_MOCK: "false"
  NAPP_MOCK_FALLBACK: "false"          # в проде false (мок-данных не подставлять)
  NAPP_BASE_URL: "https://sandboxerspapiv2.e-osgo.uz"
  NAPP_CLIENT_ID: "CHANGE_ME"
  NAPP_CLIENT_SECRET: "CHANGE_ME"
  NAPP_USERNAME: "CHANGE_ME"
  NAPP_PASSWORD: "CHANGE_ME"
  NAPP_SENDER_PINFL: "CHANGE_ME"       # реальный ПИНФЛ компании Semurg
---
# Root-креды MinIO-сервера (deploy/k8s/minio.yaml). Должны совпадать с
# MINIO_ACCESS_KEY/SECRET_KEY в sos24-api-secret выше.
apiVersion: v1
kind: Secret
metadata:
  name: sos24-minio-secret
  namespace: sos24-dev
type: Opaque
stringData:
  MINIO_ROOT_USER: "CHANGE_ME"         # = MINIO_ACCESS_KEY
  MINIO_ROOT_PASSWORD: "CHANGE_ME"     # = MINIO_SECRET_KEY (мин. 8 символов)
