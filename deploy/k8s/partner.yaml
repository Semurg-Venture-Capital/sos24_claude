# SOS24 Partner (Next.js B2B-кабинет) — Deployment + NodePort.
# NEXT_PUBLIC_API_URL вшивается на этапе СБОРКИ образа (--build-arg), здесь не задаётся.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sos24-partner
  namespace: sos24-dev
spec:
  replicas: 2
  selector:
    matchLabels: { app: sos24-partner }
  template:
    metadata:
      labels: { app: sos24-partner }
    spec:
      containers:
        - name: partner
          image: __REGISTRY__/sos24-partner:latest
          ports:
            - containerPort: 3036
          readinessProbe:
            httpGet: { path: /login, port: 3036 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: sos24-partner
  namespace: sos24-dev
spec:
  type: NodePort
  selector: { app: sos24-partner }
  ports:
    - port: 3036
      targetPort: 3036
      nodePort: 30040
