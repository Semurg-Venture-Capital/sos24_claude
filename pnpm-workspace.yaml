packages:
  - "apps/*"
  - "packages/*"

# Разрешённые postinstall-build скрипты (pnpm 11+ требует явного разрешения)
allowBuilds:
  '@nestjs/core': true # NestJS — основной фреймворк бэкенда
  '@prisma/client': true
  '@prisma/engines': true # Prisma — postinstall скачивает query-engine
  '@scarf/scarf': false # телеметрия, не нужна
  prisma: true # Prisma CLI
  puppeteer: true # Puppeteer — postinstall скачивает Chromium (генерация PDF Европротокола)
  sharp: true # обработка изображений в Next.js
  unrs-resolver: true # резолвер модулей для сборщиков (Rspack/Rsbuild)
