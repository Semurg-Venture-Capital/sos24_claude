services:
  db:
    image: postgres:16-alpine
    container_name: sos24-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sos24
      POSTGRES_PASSWORD: sos24
      POSTGRES_DB: sos24
    ports:
      - "5434:5432"
    volumes:
      - sos24-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sos24 -d sos24"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sos24-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sos24-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sos24-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sos24
      MINIO_ROOT_PASSWORD: sos24minio
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web-консоль (http://localhost:9001)
    volumes:
      - sos24-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sos24-db-data:
  sos24-minio-data:
  sos24-redis-data:
